<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="38%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#C5E1A5"/>
      <stop offset="60%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </radialGradient>
  </defs>
  <!-- Cross-section disc -->
  <circle cx="24" cy="24" r="22" fill="url(#bg)"/>
  <!-- Bark / outer rim -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#2E7D32" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Growth rings: centers progressively shifted toward (29, 27.5) so the
       heart sits off-center, reading as a tree slice rather than a target.
       Spacing varies (wider near center, narrower near outside). -->
  <circle cx="24.5" cy="24.3" r="18" fill="none" stroke="#1B5E20" stroke-width="0.8" stroke-opacity="0.45"/>
  <circle cx="25.4" cy="24.8" r="14.5" fill="none" stroke="#1B5E20" stroke-width="0.9" stroke-opacity="0.55"/>
  <circle cx="26.4" cy="25.4" r="11" fill="none" stroke="#1B5E20" stroke-width="1" stroke-opacity="0.65"/>
  <circle cx="27.3" cy="26.1" r="7.5" fill="none" stroke="#1B5E20" stroke-width="1.1" stroke-opacity="0.75"/>
  <circle cx="28.1" cy="26.7" r="4.5" fill="none" stroke="#1B5E20" stroke-width="1.2" stroke-opacity="0.85"/>
  <circle cx="28.7" cy="27.2" r="2.2" fill="none" stroke="#1B5E20" stroke-width="1.3"/>
  <!-- Heart of the tree (off-center, down-right) -->
  <circle cx="28.9" cy="27.4" r="0.9" fill="#1B5E20"/>
</svg>
